version: '3.8'
services:
  app:
    build: .
    ports:
      - '9000:9000'
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_DATABASE: spk_bansos
      DB_USERNAME: root
      DB_PASSWORD: password

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: spk_bansos
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
